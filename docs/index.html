<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dota-meta — hero rankings by bracket</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <meta name="description" content="Dota 2 hero tier list and win rates by skill bracket. Updated regularly with data from the STRATZ API.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="dota-meta — hero rankings by bracket">
  <meta property="og:description" content="Dota 2 hero tier list and win rates by skill bracket. Updated regularly with data from the STRATZ API.">
  <meta property="og:url" content="https://dota.narrowcast.dev/">
  <meta property="og:site_name" content="dota-meta">
  <meta property="og:image" content="https://dota.narrowcast.dev/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="dota-meta — hero rankings by bracket">
  <meta name="twitter:description" content="Dota 2 hero tier list and win rates by skill bracket. Updated regularly with data from the STRATZ API.">

  <link rel="canonical" href="https://dota.narrowcast.dev/">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "dota-meta",
    "description": "Dota 2 hero tier list and win rates by skill bracket. Updated regularly with data from the STRATZ API.",
    "url": "https://dota.narrowcast.dev",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Dota 2 Meta — Hero Rankings</h1>
    <p id="header-meta" class="subtitle"></p>
  </header>

  <main>
    <div class="controls">
      <label for="bracket">Bracket:</label>
      <select id="bracket"></select>
      <label for="role">Role:</label>
      <select id="role">
        <option value="all">All</option>
        <option value="cores">Cores</option>
        <option value="supports">Supports</option>
      </select>
    </div>

    <div id="legend"></div>
    <div id="tiers"></div>
  </main>

  <footer>
    <p id="generated-time"></p>
    <p>
      Data from <a href="https://www.stratz.com">STRATZ</a>.
      Built by <a href="https://github.com/narrowcastdev">Narrowcast</a>.
      <a href="https://github.com/narrowcastdev/dota-meta">Source on GitHub</a>.
    </p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
